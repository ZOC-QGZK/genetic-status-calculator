<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gene-Positive Status Predictor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            padding-top: 50px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #007bff;
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
        }
        button {
            width: 100%;
            margin-top: 20px;
        }
        #result {
            margin-top: 30px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gene-Positive Status Predictor</h1>
        <form id="predictionForm">
            <div class="mb-3">
                <label for="modelGroup">Choose Model:</label>
                <select id="modelGroup" class="form-select" onchange="toggleInputField()">
                    <option value="al_model">AL Model (AL + Parental Myopia)</option>
                    <option value="ser_model">SER Model (SER + Parental Myopia)</option>
                </select>
            </div>

            <div class="mb-3" id="alField">
                <label for="alInput">Baseline AL (mm):</label>
                <input type="number" id="alInput" class="form-control" step="0.01">
            </div>

            <div class="mb-3" id="serField" style="display: none;">
                <label for="serInput">Baseline SER (D):</label>
                <input type="number" id="serInput" class="form-control" step="0.01">
            </div>

            <div class="mb-3">
                <label for="parentInput">Number of parents with high myopia:</label>
                <select id="parentInput" class="form-select">
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Calculate Probability</button>
        </form>

        <div id="result" class="alert alert-info"></div>
    </div>

    <script>
        // 模型系数（直接用你之前训练好的）
        const modelCoefficients = {
            al_model: {
                intercept: -6.8254811,
                coef_al: 0.2395629,
                coef_parent1: 0.8192641,
                coef_parent2: 3.2537814,
                intercept_low: -9.6910197,
                intercept_high: -4.0713708,
                coef_al_low: 0.1308751,
                coef_al_high: 0.3522766,
                coef_parent1_low: 0.3670655,
                coef_parent1_high: 1.2743566,
                coef_parent2_low: 2.3871699,
                coef_parent2_high: 4.3404146
            },
            ser_model: {
                intercept: -1.6804534,
                coef_ser: -0.1288331,
                coef_parent1: 0.8771313,
                coef_parent2: 3.3234844,
                intercept_low: -2.1245372,
                intercept_high: -1.26045732,
                coef_ser_low: -0.1792309,
                coef_ser_high: -0.08054952,
                coef_parent1_low: 0.4191054,
                coef_parent1_high: 1.33939522,
                coef_parent2_low: 2.4514526,
                coef_parent2_high: 4.41397944
            }
        };

        // 切换输入框显示/隐藏
        function toggleInputField() {
            const model = document.getElementById('modelGroup').value;
            const alField = document.getElementById('alField');
            const serField = document.getElementById('serField');

            if (model === 'al_model') {
                alField.style.display = 'block';
                serField.style.display = 'none';
                document.getElementById('alInput').required = true;
                document.getElementById('serInput').required = false;
            } else {
                alField.style.display = 'none';
                serField.style.display = 'block';
                document.getElementById('alInput').required = false;
                document.getElementById('serInput').required = true;
            }
        }

        document.getElementById('predictionForm').addEventListener('submit', function (event) {
            event.preventDefault();

            const model = document.getElementById('modelGroup').value;
            const parent = parseInt(document.getElementById('parentInput').value, 10);
            const parent1 = parent === 1 ? 1 : 0;
            const parent2 = parent === 2 ? 1 : 0;

            const coefficients = modelCoefficients[model];
            let logit, logit_low, logit_high;

            if (model === 'al_model') {
                const al = parseFloat(document.getElementById('alInput').value);
                logit = coefficients.intercept + coefficients.coef_al * al + coefficients.coef_parent1 * parent1 + coefficients.coef_parent2 * parent2;
                logit_low = coefficients.intercept_low + coefficients.coef_al_low * al + coefficients.coef_parent1_low * parent1 + coefficients.coef_parent2_low * parent2;
                logit_high = coefficients.intercept_high + coefficients.coef_al_high * al + coefficients.coef_parent1_high * parent1 + coefficients.coef_parent2_high * parent2;
            } else {
                const ser = parseFloat(document.getElementById('serInput').value);
                logit = coefficients.intercept + coefficients.coef_ser * ser + coefficients.coef_parent1 * parent1 + coefficients.coef_parent2 * parent2;
                logit_low = coefficients.intercept_low + coefficients.coef_ser_low * ser + coefficients.coef_parent1_low * parent1 + coefficients.coef_parent2_low * parent2;
                logit_high = coefficients.intercept_high + coefficients.coef_ser_high * ser + coefficients.coef_parent1_high * parent1 + coefficients.coef_parent2_high * parent2;
            }

            const prob = 1 / (1 + Math.exp(-logit));
            const prob_low = 1 / (1 + Math.exp(-logit_low));
            const prob_high = 1 / (1 + Math.exp(-logit_high));

            const riskGroup = prob < 0.3 ? "Low Risk" : prob < 0.6 ? "Intermediate Risk" : "High Risk";

            document.getElementById('result').innerHTML = `
                <h5>Prediction Result</h5>
                <p>Predicted probability of gene-positive status: <strong>${(prob * 100).toFixed(1)}%</strong></p>
                <p>95% Confidence Interval: <strong>${(prob_low * 100).toFixed(1)}% – ${(prob_high * 100).toFixed(1)}%</strong></p>
                <p>Risk group: <strong>${riskGroup}</strong></p>
            `;
            document.getElementById('result').style.display = 'block';
        });
    </script>
</body>
</html>
